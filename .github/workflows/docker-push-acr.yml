name: Docker Build & Push (Aliyun ACR)

on:
  push:
    branches: [main, dev_yeyazhou]
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像标签（留空则用 sha-xxx）'
        required: false
        default: ''

concurrency:
  group: docker-acr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-push:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USER }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ secrets.ALIYUN_ACR_NAMESPACE }}/platformgateway-api:${{ needs.prepare.outputs.tag }}
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ secrets.ALIYUN_ACR_NAMESPACE }}/platformgateway-api:latest
          cache-from: type=gha,scope=platformgateway-api
          cache-to: type=gha,mode=max,scope=platformgateway-api

  summary:
    needs: [prepare, build-push]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - run: |
          REG="${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ secrets.ALIYUN_ACR_NAMESPACE }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          {
            echo "## PlatformGateway 镜像已推送"
            echo ""
            echo "- 标签: \`$TAG\` 与 \`latest\`"
            echo "- 镜像: \`$REG/platformgateway-api\`"
          } >> "$GITHUB_STEP_SUMMARY"
